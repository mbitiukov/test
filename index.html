<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Katalog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js");
  }
</script>

<body class="state-start">

    <!-- Start screen -->
    <div class="start-screen">
        <video class="bg-video" autoplay muted loop playsinline>
            <source src="assets/bg.mp4">
        </video>

        <div class="white-overlay"></div>
        <div class="purple-overlay"></div>

     <div class="logo-mask">

    <svg
        width="240"
        height="240"
        viewBox="0 0 220 220"
        xmlns="http://www.w3.org/2000/svg">

        <defs>
            <mask
                id="pngMask"
                maskUnits="userSpaceOnUse"
                maskContentUnits="userSpaceOnUse"
                mask-type="alpha">

                <image
                    href="assets/mask.png"
                    x="0"
                    y="0"
                    width="220"
                    height="220"
                    preserveAspectRatio="xMidYMid meet" />
            </mask>
        </defs>

        <!-- Video inside logo -->
        <foreignObject
            width="220"
            height="220"
            mask="url(#pngMask)">

            <div xmlns="http://www.w3.org/1999/xhtml"
                 class="logo-video-inner">

                <video autoplay muted loop playsinline>
                    <source src="assets/fg.mp4">
                </video>

            </div>
        </foreignObject>

    </svg>

</div>


        <img src="assets/logo-white-only.png" class="logo-white">
    </div>

    <!-- Gallery -->
    <section class="gallery">
        <div class="gallery-track">

            <div class="card">
                <video autoplay muted loop playsinline src="assets/v1.mp4"></video>

                <div class="card-hover">
                    <img src="assets/plus.svg" class="plus-icon">
                </div>

                <div class="card-content">
                    <p>
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                        first card.
                    </p>
                </div>
            </div>

            <div class="card">
                <video autoplay muted loop playsinline src="assets/v2.mp4"></video>

                <div class="card-hover">
                    <img src="assets/plus.svg" class="plus-icon">
                </div>

                <div class="card-content">
                    <p>
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                        Second card 
                    </p>
                </div>
            </div>

            <div class="card">
                <video autoplay muted loop playsinline src="assets/v1.mp4"></video>

                <div class="card-hover">
                    <img src="assets/plus.svg" class="plus-icon">
                </div>

                <div class="card-content">
                    <p>
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                        Third card
                    </p>
                </div>
            </div>

            <div class="card">
                <video autoplay muted loop playsinline src="assets/v2.mp4"></video>

                <div class="card-hover">
                    <img src="assets/plus.svg" class="plus-icon">
                </div>

                <div class="card-content">
                    <p>
                        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                        Fourth card
                    </p>
                </div>
            </div>

        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
